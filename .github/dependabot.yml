version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      actions-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # npm ecosystems are added per-subdir once the api/ and web/ projects
  # land in this repo. Keep them grouped so we don't drown in PRs.
